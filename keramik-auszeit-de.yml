version: '3.8'

services:
  web:
    image: "[2a01:4f8:202:1129:2447:2447:1:900]:5000/keramik-auszeit-de:latest"
    environment:
      # All secrets must be set on the server via environment file
      # NEVER commit actual values here
      # Use: docker stack deploy --compose-file keramik-auszeit-de.yml keramik-auszeit-de
      # With env file loaded on the server at /srv/apps/keramik-auszeit/config/.env
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD}
      - TOTP_SECRET=${TOTP_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - BOOKING_EMAIL=${BOOKING_EMAIL}
      - FROM_EMAIL=${FROM_EMAIL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_REGION=${S3_REGION}
      - S3_PREFIX=${S3_PREFIX}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    networks:
      - public-ingress
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.keramik-auszeit-de.rule=Host(`keramik-auszeit.de`) || Host(`www.keramik-auszeit.de`)"
        - "traefik.http.routers.keramik-auszeit-de.entrypoints=websecure"
        - "traefik.http.routers.keramik-auszeit-de.tls.certresolver=myresolver"
        - "traefik.http.services.keramik-auszeit-de.loadbalancer.server.port=3000"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  public-ingress:
    external: true
