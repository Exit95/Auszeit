apiVersion: batch/v1
kind: CronJob
metadata:
  name: sqlite-backup
  namespace: websites
spec:
  schedule: "15 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: k3s-server
          containers:
          - name: backup
            image: alpine:latest
            command: ["/bin/sh", "-c"]
            args:
            - |
              TIMESTAMP=$(date +%Y-%m-%d-%H%M)
              cp /data/danapfel.db /backups/danapfel-${TIMESTAMP}.db
              cd /backups && ls -1t danapfel-*.db | tail -n +8 | xargs -r rm -f
            volumeMounts:
            - name: source-data
              mountPath: /data
              readOnly: true
            - name: backup-dir
              mountPath: /backups
          volumes:
          - name: source-data
            hostPath:
              path: /srv/data/danapfel-digital
              type: Directory
          - name: backup-dir
            hostPath:
              path: /srv/backups/danapfel-db
              type: DirectoryOrCreate
          restartPolicy: OnFailure
