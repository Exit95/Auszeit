# Traefik Helm Values
# Install: helm install traefik traefik/traefik -n traefik -f traefik-values.yaml
deployment:
  replicas: 1
service:
  type: ClusterIP
ports:
  web:
    port: 80
    hostPort: 80
  websecure:
    port: 443
    hostPort: 443
providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true
ingressRoute:
  dashboard:
    enabled: false
nodeSelector:
  traefik: "true"
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
